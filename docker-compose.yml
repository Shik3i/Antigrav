version: "3.8"

services:
  koalaweb:
    image: ghcr.io/shik3i/antigrav:latest
    build: .
    container_name: koalaweb
    restart: unless-stopped
    ports:
      - "3001:3001"
    volumes:
      # Persist the SQLite database outside the container
      - ./data:/app/data
    environment:
      - NODE_ENV=production
      - DB_PATH=/app/data/timer.db
      - THE_ODDS_API_KEY=${THE_ODDS_API_KEY:-}
      - TWITCH_CLIENT_ID=${TWITCH_CLIENT_ID:-}
      - TWITCH_CLIENT_SECRET=${TWITCH_CLIENT_SECRET:-}
